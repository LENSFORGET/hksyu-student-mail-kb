<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HKSYU Mail Knowledge Base</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="appShell">
      <aside class="sidebar" aria-label="导航" data-i18n-aria="navAria">
        <div class="brand">
          <button id="resetBtn" class="mark" type="button" data-i18n-aria="resetAria" data-i18n-title="resetAria">HK</button>
          <div>
            <h1>HKSYU Mail KB</h1>
            <p data-i18n="browserSubtitle">Outlook-like public browser</p>
          </div>
        </div>
        <label class="languageField" aria-label="语言" data-i18n-aria="languageAria">
          <span data-i18n="languageLabel">界面语言</span>
          <select id="languageSelect">
            <option value="zh-Hans">简体中文</option>
            <option value="zh-Hant">繁體中文</option>
            <option value="en">English</option>
          </select>
        </label>
        <p class="languageHint" data-i18n="languageHint">切换界面语言，事件内容保留原文。</p>
        <label class="searchLabel" for="searchInput" data-i18n="searchLabel">搜索</label>
        <input id="searchInput" class="search" type="search" placeholder="Registry, Moodle, Career..." data-i18n-placeholder="searchPlaceholder" />
        <div class="filterGroup">
          <label><span data-i18n="yearLabel">年份</span><select id="yearFilter"></select></label>
          <label><span data-i18n="monthLabel">月份</span><select id="monthFilter"></select></label>
          <label><span data-i18n="categoryLabel">类别</span><select id="categoryFilter"></select></label>
          <label><span data-i18n="departmentLabel">部门</span><select id="departmentFilter"></select></label>
        </div>
        <button id="forecastBtn" class="forecastButton" type="button" data-i18n="forecastButton">未来一个月</button>
        <p class="forecastHint" id="forecastHint" data-i18n="forecastHintDefault">按今天日期推算接下来一个月可能遇到的 HKSYU 事项。</p>
        <nav class="folderList" id="topicList" aria-label="主题" data-i18n-aria="topicAria"></nav>
      </aside>
      <section class="messageList" aria-label="事件卡列表" data-i18n-aria="listAria">
        <header class="listHeader">
          <div>
            <h2 data-i18n="cardsTitle">事件卡</h2>
            <p id="resultMeta">Loading...</p>
          </div>
          <a class="repoLink" href="https://github.com/LENSFORGET/hksyu-student-mail-kb">GitHub</a>
        </header>
        <div id="cards" class="cards"></div>
      </section>
      <article class="readingPane" id="readingPane" aria-label="阅读窗格" data-i18n-aria="readingAria">
        <div class="emptyState">
          <h2 data-i18n="emptyTitle">选择一张事件卡</h2>
          <p data-i18n="emptyText">左侧筛选，中间选择，右侧阅读。公开版只展示匿名化后的知识摘要。</p>
        </div>
      </article>
    </main>
    <script src="./app.js?v=20260620-reset1"></script>
  </body>
</html>
